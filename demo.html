<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operion Demo — Live Enquiry Processing</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.svg">

<style>
.demo-hero { padding: 120px 0 60px; text-align: center; }
.demo-layout {
  display: grid;
  grid-template-columns: 1fr 480px;
  gap: 4rem;
  align-items: start;
  padding-bottom: 6rem;
}
.demo-form-wrap {
  background: var(--surface);
  border: 1px solid var(--cyan);
  border-radius: var(--radius-lg);
  padding: 2.5rem;
}
.response-box {
  margin-top: 1.5rem;
  padding: 1rem;
  border: 1px solid var(--cyan);
  border-radius: 8px;
}
.error {
  color: #ff6b6b;
  margin-top: 1rem;
}
@media (max-width: 900px) {
  .demo-layout { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">
    <img src="logo.svg" alt="Operion Systems">
    OPERION <span class="nav-logo-sys">SYSTEMS</span>
  </a>
</nav>

<section class="demo-hero">
  <div class="container">
    <h1>Submit an enquiry.<br>See how Operion responds.</h1>
    <p>Live pipeline execution via Operion.</p>
  </div>
</section>

<section>
  <div class="container">
    <div class="demo-layout">

      <div>
        <h2>Pipeline</h2>
        <ol>
          <li>Input received</li>
          <li>Processing</li>
          <li>Response generated</li>
          <li>Returned</li>
        </ol>
      </div>

      <div class="demo-form-wrap">

        <div id="demo-response"></div>

        <form id="demo-form">

          <div class="form-group">
            <label>Name</label>
            <input name="name" required>
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
          </div>

          <div class="form-group">
            <label>Business</label>
            <input name="company">
          </div>

          <div class="form-group">
            <label>Enquiry</label>
            <textarea name="message" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn">
            Process Enquiry →
          </button>

        </form>

      </div>

    </div>
  </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const form = document.getElementById("demo-form");
  const responseBox = document.getElementById("demo-response");
  const btn = document.getElementById("submit-btn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    btn.disabled = true;
    btn.textContent = "Processing...";

    const data = new FormData(form);

    const payload = {
      name: data.get("name"),
      email: data.get("email"),
      business: data.get("company"),
      enquiry: data.get("message")
    };

    try {
      const res = await fetch("https://nonrhymed-elmer-chrysocarpous.ngrok-free.dev", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const json = await res.json();

      responseBox.innerHTML = '<div class="response-box">' +
        json.reply.replace(/\n/g, "<br>") +
        '</div>';

    } catch (err) {
      console.error(err);
      responseBox.innerHTML = '<div class="error">Submission failed</div>';
    }

    btn.disabled = false;
    btn.textContent = "Process Enquiry →";
  });
});
</script>

</body>
</html>
